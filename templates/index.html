<!DOCTYPE html>
<html>
<head>
    <title>Job Analyzer</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: white;
        }

        .card-box {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
        }

        .btn-custom {
            background: #6366f1;
            border: none;
        }

        .btn-custom:hover {
            background: #4f46e5;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card-box text-center col-md-5">

        <h2 class="mb-4">🚀 Job Analyzer</h2>
        <p class="text-secondary">Upload your resume and get best job suggestions</p>

        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="resume" class="form-control mb-3">
            <button class="btn btn-custom w-100">Analyze Resume</button>
        </form>

    </div>
</div>

</body>
</html>
